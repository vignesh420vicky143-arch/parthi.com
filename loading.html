<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Loading</title>

<style>
    body {
        margin: 0;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        background: url(https://tse2.mm.bing.net/th/id/OIP.ITTV292GdgunoL-aIahxDQHaHa?rs=1&pid=ImgDetMain&o=7&rm=3) no-repeat center;
        font-family: Arial, sans-serif;
        color: rgb(1, 4, 14);
        overflow: hidden;
    }

    .container {
        text-align: center;
    }

    /* 3D rotating rose */
    .rose {
        width: 200px;
        height: 200px;
        margin: auto;
        background: url('https://tse2.mm.bing.net/th/id/OIP.ITTV292GdgunoL-aIahxDQHaHa?rs=1&pid=ImgDetMain&o=7&rm=3') no-repeat center/cover;
        border-radius: 50%;
        animation: rotate3d 5s infinite linear;
        box-shadow: 0 0 30px red, 0 0 60px pink;
    }

    @keyframes rotate3d {
        0% {
            transform: rotateY(0deg) rotateX(0deg);
        }
        50% {
            transform: rotateY(180deg) rotateX(180deg);
        }
        100% {
            transform: rotateY(360deg) rotateX(360deg);
        }
    }

    /* loading text animation */
    .loading-text {
        margin-top: 20px;
        font-size: 24px;
        letter-spacing: 3px;
        animation: blink 5s infinite;
    }

    @keyframes blink {
        0%, 100% { opacity: 1; }
        50% { opacity: 0.3; }
    }

    /* dots animation */
    .dots::after {
        content: "";
        animation: dots 1.5s steps(4, end) infinite;
    }

    @keyframes dots {
        0% { content: ""; }
        25% { content: "."; }
        50% { content: ".."; }
        75% { content: "..."; }
        100% { content: ""; }
    }
</style>
<script>
    setTimeout(function()
    {
        window.location.href="login.html";
    },5000);
</script>

</head>

<body>
    

<div class="container">
    <div class="rose"></div>
    <div class="loading-text"><h2>Loading</h2><span class="dots"></span></div>
</div>

</body>
</html>
